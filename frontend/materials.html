<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление материалами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
            color: #1a365d;
            line-height: 1.5;
        }

        /* Header styles */
        #main-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 120, 255, 0.1);
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        section {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: 
                0 20px 40px -10px rgba(0, 100, 200, 0.2),
                0 0 0 1px rgba(0, 120, 255, 0.1) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        section:hover {
            box-shadow: 
                0 30px 50px -15px rgba(0, 100, 255, 0.3),
                0 0 0 2px rgba(0, 150, 255, 0.2) inset;
        }

        h2 {
            color: #1a365d;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            position: relative;
            padding-bottom: 12px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            border-radius: 2px;
            animation: expandWidth 0.5s ease-out;
        }

        @keyframes expandWidth {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 60px;
                opacity: 1;
            }
        }

        /* Form styles */
        form {
            max-width: 600px;
        }

        label {
            display: block;
            color: #2c5282;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: white;
            color: #0f172a;
            margin-top: 6px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -8px rgba(37, 99, 235, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        button:active::after {
            width: 200px;
            height: 200px;
        }

        hr {
            display: none; /* Скрываем, так как используем отступы */
        }

        /* Table styles */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            background: white;
            border: 1px solid rgba(0, 120, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
            font-weight: 600;
            padding: 16px;
            text-align: left;
            border-bottom: 2px solid #3b82f6;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }

        tr {
            transition: all 0.2s ease;
            animation: fadeInRow 0.3s ease-out;
            animation-fill-mode: both;
        }

        @keyframes fadeInRow {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        tr:hover {
            background: #f8fafc;
        }

        td a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            position: relative;
        }

        td a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #2563eb;
            transition: width 0.2s ease;
        }

        td a:hover {
            color: #1d4ed8;
        }

        td a:hover::after {
            width: 100%;
        }

        td button {
            padding: 8px 16px;
            font-size: 14px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            margin: 0;
        }

        td button:hover {
            box-shadow: 0 10px 20px -8px rgba(239, 68, 68, 0.4);
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            font-size: 16px;
        }

        /* Success message animation */
        @keyframes slideInMessage {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-message {
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            animation: slideInMessage 0.3s ease-out;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            main {
                padding: 0 16px;
                margin: 20px auto;
            }

            section {
                padding: 24px;
            }

            h2 {
                font-size: 22px;
            }

            td, th {
                padding: 12px;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 5px;
            transition: background 0.2s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Header placeholder styles (для header.js) */
        #main-header:empty {
            display: none;
        }
    </style>
</head>
<body>
<div id="main-header"></div>
<script src="/header.js"></script>

<main>
    <section>
        <h2>Добавить материал</h2>
        <form id="material-form">
            <label>
                Название:
                <input type="text" id="title" placeholder="Введите название материала" required>
            </label>
            
            <label>
                Описание:
                <textarea id="description" placeholder="Добавьте описание материала (опционально)"></textarea>
            </label>
            
            <label>
                Ссылка (URL):
                <input type="url" id="link" placeholder="https://example.com/document.pdf">
            </label>
            
            <button type="submit">Сохранить материал</button>
        </form>
    </section>

    <section>
        <h2>Список материалов</h2>
        <div class="table-wrapper">
            <table id="materials-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    const role = localStorage.getItem('user_role');
    const userId = localStorage.getItem('user_id');

    // Проверка прав (базовая) с анимацией
    if (role !== 'admin') {
        alert("Доступ запрещен!");
        window.location.href = "/login.html";
    }

    async function loadMaterials() {
        const tbody = document.querySelector('#materials-table tbody');
        
        // Показываем загрузку
        tbody.innerHTML = `
            <tr>
                <td colspan="3" class="loading">Загрузка материалов...</td>
            </tr>
        `;
        
        try {
            const res = await fetch('/api/materials');
            
            if (!res.ok) throw new Error('Ошибка загрузки');
            
            const data = await res.json();
            
            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" class="empty-state">
                            Материалы не найдены. Добавьте первый материал!
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = '';
            data.forEach((m, index) => {
                const row = document.createElement('tr');
                row.style.animationDelay = `${index * 0.05}s`;
                row.innerHTML = `
                    <td><strong>${m.id}</strong></td>
                    <td>
                        <a href="${m.link}" target="_blank" rel="noopener noreferrer">
                            ${m.title}
                        </a>
                        ${m.description ? `<br><small style="color: #64748b;">${m.description}</small>` : ''}
                    </td>
                    <td>
                        <button onclick="deleteMaterial(${m.id})" title="Удалить материал">
                            Удалить
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
        } catch (err) {
            console.error('Ошибка:', err);
            tbody.innerHTML = `
                <tr>
                    <td colspan="3" style="color: #dc2626; text-align: center; padding: 40px;">
                        ⚠️ Ошибка при загрузке материалов
                    </td>
                </tr>
            `;
        }
    }

    document.getElementById('material-form').onsubmit = async (e) => {
        e.preventDefault();
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        
        // Анимация загрузки
        submitBtn.textContent = 'Сохранение...';
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.7';
        
        const payload = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            link: document.getElementById('link').value
        };

        try {
            const res = await fetch('/api/materials', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Id': userId,
                    'X-User-Role': role
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                // Успешное сохранение
                submitBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                submitBtn.textContent = '✓ Сохранено!';
                
                await loadMaterials();
                e.target.reset();
                
                setTimeout(() => {
                    submitBtn.style.background = 'linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)';
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                }, 1500);
            } else {
                throw new Error('Ошибка сохранения');
            }
        } catch (err) {
            console.error('Ошибка:', err);
            submitBtn.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
            submitBtn.textContent = '✗ Ошибка';
            
            setTimeout(() => {
                submitBtn.style.background = 'linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)';
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }, 1500);
        }
    };

    async function deleteMaterial(id) {
        if (!confirm('Вы уверены, что хотите удалить этот материал?')) return;
        
        const button = event.target;
        const originalText = button.textContent;
        
        button.textContent = 'Удаление...';
        button.disabled = true;
        button.style.opacity = '0.7';
        
        try {
            const res = await fetch(`/api/materials/${id}`, {
                method: 'DELETE',
                headers: { 'X-User-Role': role }
            });
            
            if (res.ok) {
                button.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                button.textContent = '✓ Удалено';
                
                await loadMaterials();
            } else {
                throw new Error('Ошибка удаления');
            }
        } catch (err) {
            console.error('Ошибка:', err);
            button.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
            button.textContent = '✗ Ошибка';
            
            setTimeout(() => {
                button.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
                button.textContent = originalText;
                button.disabled = false;
                button.style.opacity = '1';
            }, 1500);
        }
    }

    // Делаем функцию глобальной для onclick
    window.deleteMaterial = deleteMaterial;

    // Загружаем материалы при старте
    document.addEventListener('DOMContentLoaded', loadMaterials);
</script>

</body>
</html>
